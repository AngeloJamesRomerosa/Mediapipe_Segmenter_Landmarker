services:
  - type: web
    name: mediapipe-bg-landmarks
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GLOG_minloglevel
        value: "3"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "3"
